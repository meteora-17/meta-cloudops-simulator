version: "1.0"
name: "CloudOpsSimulator"
description: "A real-world simulation of cloud infrastructure management. Agents must provision, manage, and secure virtual resources."
action_space:
  type: "object"
  properties:
    action:
      type: "string"
      enum: ["create_instance", "delete_instance", "list_instances", "create_bucket", "upload_file", "get_status"]
    params:
      type: "object"
observation_space:
  type: "object"
tasks:
  - id: "task_1"
    name: "Basic Provisioning"
    description: "Create a 't3.micro' instance named 'web-server' in the 'us-east-1' region."
    difficulty: "easy"
  - id: "task_2"
    name: "Storage Setup"
    description: "Create a secure storage bucket named 'company-reports' and upload a file 'policy.txt' with the content 'confidential-data'."
    difficulty: "medium"
  - id: "task_3"
    name: "Full Stack Infrastructure"
    description: "Deploy a production-ready environment: create an 'm5.large' instance named 'db-prod' and a bucket 'db-backups'."
    difficulty: "hard"
config:
  API_BASE_URL: "http://localhost:8000"
  HF_ROUTER_URL: "https://router.huggingface.co/v1"
  MODEL_NAME: "meta-llama/Meta-Llama-3-70B-Instruct"
